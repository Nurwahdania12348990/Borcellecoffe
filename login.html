<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Masuk - Borcelle Coffee Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="login-page">
    <div class="login-card">
      <a href="index.html" class="brand login-brand">
        <img src="logo.svg" alt="Logo Borcelle Coffee Shop" class="brand-logo">
        <span class="brand-name">Borcelle Coffee Shop</span>
      </a>

      <p class="eyebrow" style="text-align:center;">Selamat Datang</p>
      <h1 class="login-title">Masuk ke Akun Anda</h1>
      <p class="login-sub">Gunakan akun apa saja untuk masuk ke sistem kasir Borcelle Coffee Shop.</p>

      <form id="loginForm" class="login-form" novalidate>
        <label class="login-label" for="username">Username</label>
        <input type="text" id="username" class="login-input" placeholder="Masukkan username" autocomplete="username" required />

        <label class="login-label" for="password">Password</label>
        <input type="password" id="password" class="login-input" placeholder="Masukkan password" autocomplete="current-password" required />

        <p class="login-error" id="loginError"></p>

        <button type="submit" class="login-btn">Masuk</button>
      </form>

      <p class="login-hint">Belum punya akun? Isi saja username &amp; password bebas, akun akan otomatis dibuat.</p>
    </div>
  </main>

  <script>
    // Jika sudah login, langsung arahkan ke beranda
    (function () {
      const raw = localStorage.getItem("borcelle_auth");
      if (raw) {
        try {
          const session = JSON.parse(raw);
          if (session && session.username) {
            window.location.replace("index.html");
          }
        } catch (e) {}
      }
    })();

    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("loginError");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        errorEl.textContent = "Username dan password wajib diisi.";
        return;
      }

      // Login menerima akun apa saja, tanpa validasi ke server.
      const session = {
        username: username,
        loginAt: new Date().toISOString(),
      };
      localStorage.setItem("borcelle_auth", JSON.stringify(session));
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
